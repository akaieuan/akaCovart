<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>akaCOVART · Album Art Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:#0a0a0b;}
  body{height:100vh;overflow:hidden;background:#0a0a0b;color:#e8e8ea;font-family:'IBM Plex Sans',system-ui,sans-serif;display:flex;flex-direction:column;}

  input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;cursor:pointer;height:12px;}
  input[type=range]::-webkit-slider-runnable-track{height:2px;background:#26262a;border-radius:2px;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:11px;height:11px;border-radius:50%;background:#e8e8ea;margin-top:-4.5px;}
  input[type=range]::-moz-range-track{height:2px;background:#26262a;border-radius:2px;}
  input[type=range]::-moz-range-thumb{width:11px;height:11px;border:none;border-radius:50%;background:#e8e8ea;}
  input[type=number]::-webkit-inner-spin-button{opacity:.3;}
  ::placeholder{color:#48484c;letter-spacing:.1em;}

  .pnl::-webkit-scrollbar{width:9px;}
  .pnl::-webkit-scrollbar-track{background:#0c0c0e;}
  .pnl::-webkit-scrollbar-thumb{background:#222226;border-radius:5px;border:2px solid #0c0c0e;}
  @keyframes spin{to{transform:rotate(360deg);}}

  header.bar{display:flex;align-items:center;padding:14px 22px;border-bottom:1px solid #18181b;flex:none;}
  main.app{flex:1;display:flex;min-height:0;}

  section.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:34px;background:radial-gradient(circle at 50% 38%,#121215,#0a0a0b 72%);min-width:0;}
  .frame{position:relative;width:min(74vh,720px);aspect-ratio:1;box-shadow:0 30px 80px rgba(0,0,0,.65),0 0 0 1px #1c1c20;background:#000;}
  .frame canvas{width:100%;height:100%;display:block;}
  .caption{font:400 9px/1 'IBM Plex Mono';letter-spacing:.16em;color:#55555a;}

  aside.panel{width:364px;flex:none;border-left:1px solid #18181b;background:#0c0c0e;display:flex;flex-direction:column;min-height:0;}
  .enginebar{flex:none;padding:12px 18px 0;display:flex;gap:5px;}
  .seedbar{flex:none;padding:12px 18px;border-bottom:1px solid #18181b;display:flex;gap:8px;}
  .pnl{flex:1;overflow-y:auto;min-height:0;}
  .foot{flex:none;padding:12px 18px;border-top:1px solid #18181b;display:flex;flex-direction:column;gap:9px;}

  .seed-in{flex:1;min-width:0;background:#141417;border:1px solid #222226;color:#e8e8ea;font:500 12px/1 'IBM Plex Mono';padding:0 12px;height:40px;border-radius:3px;outline:none;}
  .gen-btn{flex:none;padding:0 18px;height:40px;background:#ececef;border:none;color:#0a0a0b;border-radius:3px;font:600 10px/1 'IBM Plex Mono';letter-spacing:.14em;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:7px;}
  .gen-btn:hover{background:#fff;}

  .seg{flex:1;padding:8px 0;font:500 9px/1 'IBM Plex Mono';letter-spacing:.12em;text-align:center;cursor:pointer;border:1px solid #202024;background:transparent;color:#6a6a6e;border-radius:3px;text-transform:uppercase;transition:all .12s;}
  .seg.active{border-color:#3a3a42;background:#2a2a31;color:#ececef;}
  .seg:hover{border-color:#3a3a42;}

  .tog{display:inline-flex;align-items:center;padding:5px 12px;cursor:pointer;border:1px solid #202024;background:transparent;color:#6a6a6e;border-radius:999px;font:600 9px/1 'IBM Plex Mono';letter-spacing:.14em;}
  .tog.on{border-color:#3a3a42;background:#2a2a31;color:#ececef;}

  .chip{padding:9px 4px;font:600 8px/1 'IBM Plex Mono';letter-spacing:.08em;text-align:center;cursor:pointer;border:1px solid #202024;background:#141417;color:#bcbcc2;border-radius:3px;}
  .chip:hover{border-color:#3a3a42;background:#1c1c20;}

  .sec{border-bottom:1px solid #161619;}
  .sec>.hd{width:100%;display:flex;align-items:center;justify-content:space-between;padding:15px 20px;background:transparent;border:none;cursor:pointer;font:600 9px/1 'IBM Plex Mono';letter-spacing:.22em;color:#9a9aa0;}
  .sec>.hd .gl{color:#6a6a6e;font:400 14px/1 'IBM Plex Mono';}
  .sec>.bd{padding:0 20px 18px;}

  .row{margin-bottom:16px;}
  .row.last{margin-bottom:0;}
  .row .top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px;}
  .lbl{font:500 9px/1 'IBM Plex Mono';letter-spacing:.14em;color:#8a8a8e;}
  .lbl.sub{color:#6a6a6e;}
  .val{font:500 10px/1 'IBM Plex Mono';color:#d8d8da;}

  .trow{display:flex;align-items:center;justify-content:space-between;margin:18px 0 12px;}
  .glabel{font:500 9px/1 'IBM Plex Mono';letter-spacing:.14em;color:#8a8a8e;margin:18px 0 12px;}
  .glabel.sub{color:#6a6a6e;margin:0 0 8px;}
  .glabel.beat{font:600 9px/1 'IBM Plex Mono';letter-spacing:.18em;color:#6a6a6e;margin-bottom:14px;}
  .divider{height:1px;background:#161619;margin:16px 0;}

  .tin{width:100%;background:#141417;border:1px solid #222226;color:#e8e8ea;font:600 11px/1 'IBM Plex Mono';letter-spacing:.1em;padding:0 12px;height:38px;border-radius:3px;outline:none;margin-bottom:9px;}
  .tin.artist{color:#b8b8bc;font-weight:400;margin-bottom:14px;}

  .preset-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:16px;}
  .gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
  .thumb{position:relative;padding:0;border:1px solid #1e1e22;background:#000;border-radius:3px;cursor:pointer;aspect-ratio:1;overflow:hidden;line-height:0;}
  .thumb:hover{border-color:#4a4a52;}
  .thumb canvas{width:100%;height:100%;display:block;}
  .more-btn{background:transparent;border:1px solid #202024;color:#9a9aa0;border-radius:3px;padding:5px 10px;font:600 8px/1 'IBM Plex Mono';letter-spacing:.12em;cursor:pointer;}
  .more-btn:hover{border-color:#3a3a42;color:#ececef;}

  .anchor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;width:108px;}
  .anchor{aspect-ratio:1.4;cursor:pointer;border:1px solid #202024;background:#141417;border-radius:3px;display:flex;padding:5px;}
  .anchor.active{border-color:#3a3a42;background:#2a2a31;}
  .anchor:hover{border-color:#3a3a42;}
  .anchor .dot{width:4px;height:4px;border-radius:50%;background:#55555a;}
  .anchor.active .dot{background:#ececef;}

  .primary{width:100%;height:44px;background:#ececef;border:none;color:#0a0a0b;border-radius:3px;font:600 10px/1 'IBM Plex Mono';letter-spacing:.16em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;}
  .primary:hover{background:#fff;}
  .spin{display:none;}
  .spin.go{display:inline-block;animation:spin .8s linear infinite;}
  .anim-intro{padding:16px 20px 4px;font:400 9px/1.7 'IBM Plex Mono';letter-spacing:.05em;color:#6a6a6e;}
</style>
</head>
<body>

  <header class="bar">
    <span style="display:inline-flex;align-items:baseline;">
      <span style="font:300 15px/1 'IBM Plex Mono';letter-spacing:.3em;color:#7d7d83;">aka</span><span style="font:600 15px/1 'IBM Plex Mono';letter-spacing:.3em;color:#f0f0f2;">COVART</span>
    </span>
  </header>

  <main class="app">
    <section class="stage">
      <div class="frame"><canvas id="canvas"></canvas></div>
      <div class="caption">3000 × 3000 PX&nbsp;&nbsp;·&nbsp;&nbsp;SEED&nbsp;<span id="capSeed"></span></div>
    </section>

    <aside class="panel">
      <div class="enginebar" id="engineBar"></div>
      <div class="seedbar">
        <input class="seed-in" id="seedInput" type="number">
        <button class="gen-btn" id="genBtn">↻&nbsp;GENERATE</button>
      </div>
      <div class="pnl">
        <div id="stillWrap"></div>
        <div id="animWrap"></div>
      </div>
      <div class="foot">
        <div style="display:flex;gap:6px;" id="modeBar"></div>
        <button class="primary" id="primaryBtn"><span class="spin" id="spin">◐</span><span id="actionLabel"></span></button>
      </div>
    </aside>
  </main>

        diamondColors:[[120,134,120],[160,120,130],[118,124,156],[150,150,110],[90,96,92]],
        fleck:[244,242,238], smoke:[100,98,96],
        accentColors:[[196,176,40],[60,150,150],[206,120,148]],
        scratch:'rgb(54,52,50)', markerColors:[[100,96,92],[80,130,140],[150,110,120]], markerBg:[120,114,108], markerDot:[56,54,52],

  },

  resolveMood(seed,mood){ if(mood!=='random') return mood; var r=this.prng(seed>>>0); return ['dark','cream','grey'][Math.floor(r()*3)]; },

  renderTo(canvas,S,p){

    else if(eng==='waves'){ this.fieldWaves(ctx,S,p,mood,cfg,seed,{T:T,ANIM:ANIM,kickE:kickE,kick:kick,hue:hue,drift:drift}); }
    else if(eng==='orb'){ this.fieldOrb(ctx,S,p,mood,cfg,seed,{T:T,ANIM:ANIM,kickE:kickE,pumpE:pumpE,kick:kick,pump:pump,hue:hue,drift:drift,swirl:swirl}); }

    var nFree=Math.round(cfg.blobCount*(0.4+p.density/100*1.3));
    var aDr=ANIM?S*0.055*((p.animDrift||0)/100):0, aSw=ANIM?((p.animSwirl||0)/100):0;
    for(var i=0;i<nFree;i++){ var pos=samplePos(); var col=pick(rB,cfg.colors); var r=S*(cfg.rMin+rB()*(cfg.rMax-cfg.rMin))*bsz; var a=Math.min(1.1,(cfg.aMin+rB()*(cfg.aMax-cfg.aMin))*glowF);
      var bx=pos.x, by=pos.y, br=1;

        var wx=Math.sin(T*f1+ph)+0.6*Math.sin(T*f2*1.7+ph*1.6)+0.4*Math.cos(T*0.23+i);
        var wy=Math.cos(T*f1*0.9+ph*1.1)+0.6*Math.cos(T*f2*1.5+ph*0.7)+0.4*Math.sin(T*0.19+i*1.3);
        bx+=wx*amp*0.55 + Math.cos(dir)*Math.sin(T*rf)*roam;
        by+=wy*amp*0.55 + Math.sin(dir)*Math.sin(T*rf*1.13+1.7)*roam;

    addSlider(bd,{key:'grain',label:'FILM GRAIN',min:0,max:100});
    addSlider(bd,{key:'grainSize',label:'GRAIN SIZE',min:0,max:100});
    addSlider(bd,{key:'dust',label:'DUST / SPECKS',min:0,max:100});
    addToggle(bd,{key:'scratches',label:'SCRATCH LINES'});
    addSlider(bd,{key:'scratchCount',label:'COUNT',min:0,max:16,sub:true,last:true});
  })();

  // --- SIGIL ---
  (function(){
    var bd=addSection(still,'SIGIL','sigil');
    addToggle(bd,{key:'sigilMarks',label:'SIGIL MARKS'});
    addSlider(bd,{key:'sigilMarkCount',label:'DENSITY',min:0,max:20,sub:true});
    addSlider(bd,{key:'sigilMarkSize',label:'SIZE',min:0,max:100,sub:true});
    addSlider(bd,{key:'sigilMarkScatter',label:'SCATTER',min:0,max:100,sub:true});
    addDivider(bd);
    addToggle(bd,{key:'sigilFrame',label:'BARB FRAME'});
    addSlider(bd,{key:'sigilFrameDensity',label:'FRAME DENSITY',min:0,max:100,sub:true,last:true});
  })();

  // --- TYPE OVERLAY ---
  (function(){
    var bd=addSection(still,'TYPE OVERLAY','type');
    addToggle(bd,{key:'showText',label:'RENDER TEXT'});
    var ti=document.createElement('input'); ti.type='text'; ti.className='tin'; ti.placeholder='TITLE'; ti.value=state.title;
    ti.addEventListener('input',function(e){ setState({title:e.target.value}); });
    var ar=document.createElement('input'); ar.type='text'; ar.className='tin artist'; ar.placeholder='ARTIST'; ar.value=state.artist;
    ar.addEventListener('input',function(e){ setState({artist:e.target.value}); });
    bd.appendChild(ti); bd.appendChild(ar);
    inputEls.title=ti; inputEls.artist=ar;
    addGroupLabel(bd,'CASE','sub');
    addSeg(bd,{key:'textCase',style:'margin-bottom:14px;',options:[
      {val:'upper',label:'UPPER'},{val:'lower',label:'lower'},{val:'asis',label:'As-Is'},{val:'manic',label:'ManIC'}]});
    addSlider(bd,{key:'distort',label:'DISTORT&nbsp;/&nbsp;GLITCH',min:0,max:100,sub:true});
    addGroupLabel(bd,'COLOR','sub');
    addSeg(bd,{key:'textColor',style:'margin-bottom:14px;',options:[
      {val:'auto',label:'AUTO'},{val:'light',label:'LIGHT'},{val:'dark',label:'DARK'}]});
    var posHead=mk('div'); posHead.style.cssText='display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;';
    posHead.appendChild(mk('span','lbl sub','POSITION'));
    posHead.appendChild(mk('span',null,'or drag on canvas ⤢')).style.cssText='font:400 8px/1 \'IBM Plex Mono\';letter-spacing:.08em;color:#55555a;';
    bd.appendChild(posHead);
    var ag=mk('div','anchor-grid');
    var cols=[{x:0.05,a:'left'},{x:0.5,a:'center'},{x:0.95,a:'right'}];
    var rows=[0.06,0.45,0.84];
    for(var ri=0;ri<3;ri++){ for(var ci=0;ci<3;ci++){ (function(ri,ci){
      var cx=cols[ci], ry=rows[ri];
      var b=mk('button','anchor');
      b.style.alignItems = cx.a==='left'?'flex-start':cx.a==='right'?'flex-end':'center';
      b.style.justifyContent = ri===0?'flex-start':ri===2?'flex-end':'center';
      b.appendChild(mk('span','dot'));
      b.addEventListener('click',function(){ setState({textX:cx.x,textY:ry,textAlign:cx.a}); });
      ag.appendChild(b); anchorBtns.push({x:cx.x,y:ry,a:cx.a,btn:b});
    })(ri,ci); } }
    bd.appendChild(ag);
  })();

  // --- ANIMATE PANEL ---
  var animWrap=document.getElementById('animWrap');
  (function(){
    animWrap.appendChild(mk('div','anim-intro','Beat-synced motion for techno. Set the BPM, dial the pump &amp; kick, then export a looping video (MP4 where supported, else WEBM).'));
    var bd=mk('div'); bd.style.cssText='padding:14px 20px 6px;'; animWrap.appendChild(bd);
    addGroupLabel(bd,'BEAT','beat');
    addSlider(bd,{key:'animBPM',label:'BPM',min:90,max:160});
    addSlider(bd,{key:'animPump',label:'PUMP',min:0,max:100});
    addSlider(bd,{key:'animKick',label:'KICK',min:0,max:100,last:true});
    addDivider(bd);
    addGroupLabel(bd,'DRIFT','beat');
    addSlider(bd,{key:'animSpeed',label:'SPEED',min:0,max:100});
    addSlider(bd,{key:'animDrift',label:'WANDER',min:0,max:100});
    addSlider(bd,{key:'animSwirl',label:'SWIRL',min:0,max:100,last:true});
    addDivider(bd);
    addGroupLabel(bd,'COLOR','beat');
    addSlider(bd,{key:'animHue',label:'HUE CYCLE',min:0,max:100});
    addSlider(bd,{key:'animFlicker',label:'FLICKER',min:0,max:100,last:true});
  })();

  // --- FOOTER mode + primary ---
  addSeg(document.getElementById('modeBar'),{key:'mode',options:[
    {val:'still',label:'STILL'},{val:'animate',label:'ANIMATE'}]});

  var seedInput=document.getElementById('seedInput');
  seedInput.value=state.seed;
  seedInput.addEventListener('change',function(e){ setState({seed:Number(e.target.value)}); });
  document.getElementById('genBtn').addEventListener('click',function(){ setState({seed:randSeed()}); });
  document.getElementById('primaryBtn').addEventListener('click',function(){ if(state.mode==='animate') record(); else download(); });

  /* ============================ STATE / SYNC ============================ */
  function setState(patch){ Object.assign(state,patch); syncDOM(); afterState(); }

  function syncDOM(){
    document.getElementById('capSeed').textContent=(state.seed>>>0);
    if(document.activeElement!==seedInput) seedInput.value=state.seed;

    // sliders + value displays
    for(var k in inputEls){ if(inputEls[k].type==='range'){ if(document.activeElement!==inputEls[k]) inputEls[k].value=state[k]; } }
    for(var vk in valEls){ valEls[vk].textContent=state[vk]; }
    // text fields
    if(inputEls.title && document.activeElement!==inputEls.title) inputEls.title.value=state.title;
    if(inputEls.artist && document.activeElement!==inputEls.artist) inputEls.artist.value=state.artist;

    // toggles
    for(var tk in togEls){ var on=!!state[tk]; togEls[tk].classList.toggle('on',on); togEls[tk].textContent=on?'ON':'OFF'; }

    // segmented groups
    segGroups.forEach(function(grp){ grp.entries.forEach(function(en){ en.btn.classList.toggle('active',state[grp.key]===en.val); }); });

    // sections open/close
    sections.forEach(function(sec){ var open=!!state.open[sec._key]; sec._bd.style.display=open?'':'none'; sec._glyph.textContent=open?'−':'+'; });

    // engine subsections
    compBlob.style.display = state.engine==='blob'?'':'none';
    compGrid.style.display = state.engine==='grid'?'':'none';
    compWaves.style.display = state.engine==='waves'?'':'none';
    compOrb.style.display = state.engine==='orb'?'':'none';

    // mode panels
    document.getElementById('stillWrap').style.display = state.mode==='still'?'':'none';
    animWrap.style.display = state.mode==='animate'?'':'none';

    // anchors
    anchorBtns.forEach(function(an){ var on=Math.abs(state.textX-an.x)<0.02 && Math.abs(state.textY-an.y)<0.02 && state.textAlign===an.a; an.btn.classList.toggle('active',on); });

    // primary action
    var label = state.mode==='animate' ? (state.recording?'RECORDING…':'EXPORT VIDEO LOOP') : (state.rendering?'RENDERING…':'DOWNLOAD PNG · 3000²');
    document.getElementById('actionLabel').textContent=label;
    document.getElementById('spin').classList.toggle('go', state.rendering||state.recording);
  }

  /* ---- canvas drawing ---- */
  function draw(){ lastSig=sig(); var c=canvas, S=DISPLAY; c.width=S; c.height=S; ENGINE.renderTo(c,S,state); }
  function drawGallery(){ lastGSig=gallerySig(); var seeds=state.gallerySeeds, T=THUMB;
    for(var i=0;i<seeds.length;i++){ var el=thumbEls[i]; if(!el) continue; el.width=T; el.height=T; ENGINE.renderTo(el,T,Object.assign({},state,{seed:seeds[i],showText:false})); } }

  function afterState(){
    if(state.mode==='animate'){ if(!raf) startAnim(); return; }
    if(raf) stopAnim();
    if(sig()!==lastSig) draw();
    if(gallerySig()!==lastGSig) drawGallery();
  }

  /* ---- animation loop (beat-synced) ---- */
  var raf=null, t0=0;
  function startAnim(){ if(raf) return; var c=canvas, S=DISPLAY; c.width=S; c.height=S; t0=performance.now();
    ENGINE.renderTo(c,S,Object.assign({},state,{_anim:true,_t:0,_rt:0,_bake:false}));
    var loop=function(now){ if(state.mode!=='animate'){ raf=null; return; }
      var sp=0.3+(state.animSpeed/100)*1.7; var rt=(now-t0)/1000; var t=rt*sp; var bake=!!state.recording;
      var p=Object.assign({},state,{_anim:true,_t:t,_rt:rt,_bake:bake});
      ENGINE.renderTo(c,S,p);
      if(bake){ c.style.filter='none'; } else { var cc=1+((state.contrast-50)/50)*0.7, sf=state.saturation/50; c.style.filter='contrast('+cc.toFixed(3)+') saturate('+sf.toFixed(3)+')'; }
      raf=requestAnimationFrame(loop);
    };
    raf=requestAnimationFrame(loop);
  }
  function stopAnim(){ if(raf){ cancelAnimationFrame(raf); raf=null; } canvas.style.filter='none'; lastSig=null; lastGSig=null; draw(); requestAnimationFrame(drawGallery); }

  /* ---- PNG export (3000²) ---- */
  function download(){
    if(state.rendering) return;
    setState({rendering:true});
    var go=function(){ try{ var S=3000; var off=document.createElement('canvas'); off.width=S; off.height=S; ENGINE.renderTo(off,S,state);
      off.toBlob(function(blob){ var url=URL.createObjectURL(blob); var a=document.createElement('a'); var mood=ENGINE.resolveMood(state.seed>>>0,state.mood); a.href=url; a.download='albumart_'+mood+'_'+(state.seed>>>0)+'.png'; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },3000); setState({rendering:false}); },'image/png'); }
      catch(err){ console.error(err); setState({rendering:false}); } };
    if(document.fonts&&document.fonts.ready){ document.fonts.ready.then(function(){ requestAnimationFrame(go); }); } else { requestAnimationFrame(go); }
  }

  /* ---- video export (MediaRecorder) ---- */
  var rec=null;
  function record(){ if(rec) return; var c=canvas; if(!c||!c.captureStream){ return; }
    setState({recording:true});
    setTimeout(function(){ var stream=c.captureStream(30), mime='video/webm';
      var want=['video/mp4;codecs=h264','video/mp4','video/webm;codecs=vp9','video/webm'];
      if(window.MediaRecorder && MediaRecorder.isTypeSupported){ for(var w=0;w<want.length;w++){ if(MediaRecorder.isTypeSupported(want[w])){ mime=want[w]; break; } } }
      try{ rec=new MediaRecorder(stream,{mimeType:mime}); }catch(e){ try{ rec=new MediaRecorder(stream); mime='video/webm'; }catch(e2){ setState({recording:false}); return; } }
      var ext=mime.indexOf('mp4')>=0?'mp4':'webm';
      var chunks=[]; rec.ondataavailable=function(e){ if(e.data && e.data.size) chunks.push(e.data); };
      rec.onstop=function(){ var blob=new Blob(chunks,{type:mime.split(';')[0]}); var url=URL.createObjectURL(blob); var a=document.createElement('a'); a.href=url; a.download='akacovart_'+(state.seed>>>0)+'.'+ext; document.body.appendChild(a); a.click(); a.remove(); setTimeout(function(){ URL.revokeObjectURL(url); },4000); rec=null; setState({recording:false}); };
      rec.start();
      setTimeout(function(){ if(rec){ try{ rec.stop(); }catch(e){} } }, 6200);
    }, 60);
  }

  /* ---- drag-to-move text on canvas ---- */
  function bindDrag(){ var c=canvas; var drag=null;
    var norm=function(e){ var r=c.getBoundingClientRect(); return {x:(e.clientX-r.left)/r.width, y:(e.clientY-r.top)/r.height}; };
    c.addEventListener('pointerdown',function(e){ if(!state.showText) return; var p=norm(e); var b=ENGINE._textBox;
      if(b && p.x>=b.x-0.04 && p.x<=b.x+b.w+0.04 && p.y>=b.y-0.04 && p.y<=b.y+b.h+0.04){ drag={dx:p.x-state.textX, dy:p.y-state.textY}; c.setPointerCapture(e.pointerId); c.style.cursor='grabbing'; e.preventDefault(); } });
    c.addEventListener('pointermove',function(e){ var p=norm(e);
      if(drag){ var nx=Math.max(0.01,Math.min(0.99,p.x-drag.dx)), ny=Math.max(0.01,Math.min(0.99,p.y-drag.dy)); setState({textX:nx,textY:ny}); }
      else if(state.showText && ENGINE._textBox){ var b=ENGINE._textBox; c.style.cursor=(p.x>=b.x-0.04&&p.x<=b.x+b.w+0.04&&p.y>=b.y-0.04&&p.y<=b.y+b.h+0.04)?'grab':'default'; } });
    var end=function(){ if(drag){ drag=null; c.style.cursor='grab'; } };
    c.addEventListener('pointerup',end); c.addEventListener('pointercancel',end);
  }

  /* ============================ MOUNT ============================ */
  syncDOM();
  draw();
  drawGallery();
  bindDrag();
  if(document.fonts && document.fonts.ready){ document.fonts.ready.then(function(){ draw(); drawGallery(); }); }
})();
</script>
</body>
</html>
